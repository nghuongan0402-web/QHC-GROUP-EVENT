<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>QHC GROUP – Thông Tin Địa Điểm Sự Kiện</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { min-height: 100%; background: #040f08; }
  body { font-family: 'Cormorant Garamond', 'Times New Roman', serif; }

  .qhc-page {
    min-height: 100vh;
    background:
      radial-gradient(ellipse 70% 50% at 50% 0%, rgba(212,175,55,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 50% 100%, rgba(30,90,40,0.12) 0%, transparent 70%),
      linear-gradient(160deg, #0a1f0f 0%, #0d2b14 20%, #0b2318 45%, #071a10 70%, #040f08 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3rem 1.5rem 2.5rem;
    position: relative;
    overflow: hidden;
  }

  .logo-wrap {
    position: relative;
    width: 170px;
    height: 130px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 2.2rem;
    z-index: 1;
    animation: fadeDown 1s ease both;
  }

  .logo-wrap img {
    width: 170px;
    height: auto;
    object-fit: contain;
    display: block;
  }

  .heading-section {
    text-align: center;
    margin-bottom: 2.8rem;
    z-index: 1;
    animation: fadeDown 1s 0.2s ease both;
  }

  .main-heading {
    font-family: 'Cormorant Garamond', 'Times New Roman', serif;
    font-size: clamp(1.55rem, 4.5vw, 2.5rem);
    font-weight: 600;
    letter-spacing: 0.12em;
    line-height: 1.25;
    background: linear-gradient(135deg, #c9a227 0%, #f0d060 30%, #fef48f 55%, #e8c040 80%, #b8921f 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.9rem;
  }

  .ornament {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }
  .ornament-line {
    width: 80px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(212,175,55,0.55), transparent);
  }
  .ornament-diamond {
    width: 6px; height: 6px;
    background: linear-gradient(135deg, #c9a227, #fef48f);
    transform: rotate(45deg);
  }

  .buttons-container {
    display: flex;
    flex-direction: column;
    gap: 1.4rem;
    width: 100%;
    max-width: 500px;
    z-index: 1;
    animation: fadeUp 1s 0.4s ease both;
  }

  @media (min-width: 600px) {
    .buttons-container { flex-direction: row; max-width: 820px; gap: 1.8rem; }
  }

  .venue-btn {
    flex: 1;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 2rem 1.5rem 1.8rem;
    border-radius: 20px;
    text-decoration: none;
    position: relative; overflow: hidden; cursor: pointer;
    border: 1px solid rgba(212,175,55,0.22);
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.4s ease, border-color 0.4s ease;
    min-height: 210px;
  }
  .venue-btn::before {
    content: ''; position: absolute; inset: 0; border-radius: 19px;
    opacity: 0; transition: opacity 0.4s ease;
  }
  .venue-btn:hover { transform: translateY(-7px) scale(1.02); border-color: rgba(212,175,55,0.5); }
  .venue-btn:hover::before { opacity: 1; }

  .btn-gold {
    background: linear-gradient(145deg, #1a3a0a 0%, #243d10 30%, #1c3208 60%, #142808 100%);
    box-shadow: 0 8px 36px rgba(0,0,0,0.5), inset 0 1px 0 rgba(212,175,55,0.1);
  }
  .btn-gold::before { background: linear-gradient(145deg, rgba(212,175,55,0.06) 0%, rgba(254,244,143,0.03) 100%); }
  .btn-gold:hover { box-shadow: 0 18px 52px rgba(0,0,0,0.6), 0 0 35px rgba(212,175,55,0.13), inset 0 1px 0 rgba(212,175,55,0.18); }

  .btn-green {
    background: linear-gradient(145deg, #0d2b14 0%, #133520 30%, #0e2a18 60%, #091e0f 100%);
    box-shadow: 0 8px 36px rgba(0,0,0,0.5), inset 0 1px 0 rgba(30,150,60,0.1);
  }
  .btn-green::before { background: linear-gradient(145deg, rgba(30,120,50,0.06) 0%, rgba(60,180,80,0.03) 100%); }
  .btn-green:hover { box-shadow: 0 18px 52px rgba(0,0,0,0.6), 0 0 35px rgba(30,150,60,0.15), inset 0 1px 0 rgba(60,180,80,0.18); border-color: rgba(60,180,80,0.32); }

  .btn-inner {
    position: relative; z-index: 2;
    display: flex; flex-direction: column; align-items: center;
    gap: 0.5rem; width: 100%;
  }
  .btn-label {
    font-family: 'Times New Roman', serif;
    font-size: 0.75rem; font-weight: 400; letter-spacing: 0.24em;
    text-transform: uppercase; color: #FEF48F; opacity: 0.68;
    padding: 4px 14px; border: 1px solid rgba(254,244,143,0.22);
    border-radius: 30px; margin-bottom: 0.35rem;
  }
  .btn-main-title {
    font-family: 'Times New Roman', serif;
    font-size: clamp(1.3rem, 3.5vw, 1.8rem); font-weight: 700;
    letter-spacing: 0.09em; color: #FEF48F; line-height: 1.1; text-align: center;
  }
  .btn-divider {
    width: 42px; height: 1px; margin: 0.5rem 0;
    background: linear-gradient(90deg, transparent, rgba(254,244,143,0.38), transparent);
  }
  .btn-subtitle {
    font-family: 'Times New Roman', serif;
    font-size: 0.88rem; font-weight: 400; letter-spacing: 0.05em;
    color: #FEF48F; opacity: 0.8; text-align: center;
  }
  .btn-arrow {
    font-family: 'Times New Roman', serif;
    font-size: 0.76rem; color: #FEF48F; opacity: 0.45; margin-top: 0.45rem;
    letter-spacing: 0.16em; text-transform: uppercase; transition: opacity 0.3s ease;
  }
  .venue-btn:hover .btn-arrow { opacity: 0.8; }

  .footer-section {
    margin-top: 3.4rem; text-align: center; z-index: 1;
    animation: fadeUp 1s 0.6s ease both;
  }
  .footer-ornament {
    display: flex; align-items: center; justify-content: center;
    gap: 14px; margin-bottom: 1.4rem;
  }
  .footer-ornament-line {
    width: 100px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(212,175,55,0.4), transparent);
  }
  .footer-ornament-dot { display: flex; gap: 5px; align-items: center; }
  .footer-ornament-dot span {
    display: block; width: 4px; height: 4px;
    background: rgba(212,175,55,0.55); transform: rotate(45deg);
  }
  .footer-text {
    font-family: 'Cormorant Garamond', 'Times New Roman', serif;
    font-size: clamp(1.05rem, 3.2vw, 1.75rem); font-weight: 600;
    letter-spacing: 0.18em; text-transform: uppercase;
    background: linear-gradient(135deg, #a07820 0%, #d4af37 25%, #fef48f 50%, #d4af37 75%, #a07820 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    line-height: 1.3;
  }
  .footer-sub {
    font-family: 'Cormorant Garamond', 'Times New Roman', serif;
    font-size: 0.82rem; letter-spacing: 0.13em;
    color: rgba(212,175,55,0.38); margin-top: 0.9rem; font-style: italic;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
